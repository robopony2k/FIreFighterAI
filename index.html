<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fireline Command</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <div id="characterScreen" class="character-screen hidden">
        <div class="character-panel">
          <div class="character-header">
            <div class="badge">COMMAND ROSTER</div>
            <h2>Choose Your Fire Chief</h2>
            <p>Different leadership styles shape budgets, response speed, and containment.</p>
          </div>
          <div class="character-preview">
            <div id="characterPreviewPortrait" class="character-preview-portrait">
              <img id="characterPreviewImage" class="character-preview-image" alt="Selected chief portrait" />
              <span id="characterPreviewInitials"></span>
            </div>
            <div class="character-preview-fields">
              <label class="character-input">
                Callsign
                <div class="character-input-row">
                  <input id="characterNameInput" type="text" maxlength="24" />
                  <button id="characterNameRandom" type="button">Random</button>
                </div>
              </label>
              <div class="character-input-note">Callsign is used for leaderboards only.</div>
            </div>
          </div>
          <div id="characterGrid" class="character-grid"></div>
          <div class="character-footer">
            <p id="characterSummary">Select a chief to begin the campaign.</p>
            <button id="characterConfirm" disabled>Begin Command</button>
          </div>
        </div>
      </div>
      <section class="playfield">
        <div class="canvas-wrap">
          <canvas id="gameCanvas" width="1400" height="900"></canvas>
          <div id="overlay" class="overlay hidden">
            <div class="overlay-card">
              <h2 id="overlayTitle">Fireline</h2>
              <p id="overlayMessage"></p>
              <ul id="overlayDetails" class="overlay-details"></ul>
              <div class="overlay-actions">
                <button id="overlayRestart">Play Again</button>
              </div>
            </div>
          </div>
        </div>
      </section>
      <div id="phaseUI" class="phase-ui-root"></div>
    </div>

    <script type="module" src="dist/main.js"></script>
  </body>
</html>
