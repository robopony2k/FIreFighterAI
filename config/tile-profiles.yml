  # Profile fields:
  #   baseFuel        = relative fuel load per tile (0-2), higher = more sustain
  #   ignition        = normalized heat required to ignite (0-1.4), higher = harder to start
  #   burnRate        = speed at which fire grows/drains fuel (0-1), larger = quick burning
  #   heatOutput      = heat emitted when burning (0-2), larger boosts diffusion
  #   spreadBoost     = multiplier applied to outgoing heat (0-2), controls how fast heat fans out
  #   heatTransferCap = cap on per-tick heat that can accumulate in neighbors (0-5)
  #   heatRetention   = fraction of incoming heat retained (0-1), lower = quicker cooling
  #   windFactor      = alignment weight for wind bias (0-2), larger = more directional spread
